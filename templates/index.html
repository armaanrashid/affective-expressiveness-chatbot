<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Interaction Task</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>

  <body>
    <header class="header">
      <h1>AI Interaction Task</h1>
      <p>
        You will interact with an AI partner designed to respond to your messages in a conversational manner.
        Please engage naturally. The conversation will last for approximately 5 messages.
        After that, you will return to the survey.
      </p>
    </header>

    <main>
      <div id="chat-window" class="chat-window"></div>

      <form id="chat-form" class="chat-form" autocomplete="off">
        <input
          id="chat-input"
          type="text"
          placeholder="Type your message..."
          required
        />
        <button type="submit">Send</button>
      </form>
    </main>

    <script>
      (function () {
        function getParam(name) {
          const url = new URL(window.location.href);
          return url.searchParams.get(name);
        }

        const cid = getParam("cid");
        const pid = getParam("pid") || "unknown";
        const returnUrl = getParam("returnUrl");

        if (!cid) {
          document.body.innerHTML = `
            <main style="max-width: 700px; margin: 60px auto; font-family: Arial, sans-serif;">
              <h2>Invalid Access</h2>
              <p>This AI interaction must be accessed through the survey link.</p>
            </main>
          `;
          return;
        }

        const chatWindow = document.getElementById("chat-window");
        const chatForm = document.getElementById("chat-form");
        const chatInput = document.getElementById("chat-input");

        let history = [];

        function appendMessage(role, content) {
          const messageEl = document.createElement("div");
          messageEl.classList.add("message", role);
          messageEl.textContent = content;
          chatWindow.appendChild(messageEl);
          chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function redirectToSurvey() {
          if (!returnUrl) {
            appendMessage(
              "assistant",
              "The conversation is complete. Please return to the survey."
            );
            return;
          }

          const separator = returnUrl.includes("?") ? "&" : "?";

          setTimeout(function () {
            window.location.href =
              returnUrl +
              separator +
              "pid=" + encodeURIComponent(pid) +
              "&cid=" + encodeURIComponent(cid);
          }, 2500);
        }

        chatForm.addEventListener("submit", function (e) {
          e.preventDefault();

          const userMessage = chatInput.value.trim();
          if (!userMessage) return;

          appendMessage("user", userMessage);
          history.push({ role: "user", content: userMessage });

          chatInput.value = "";
          chatInput.focus();

          const payload = {
            message: userMessage,
            cid: cid,
            pid: pid,
            history: history.slice(0, history.length - 1)
          };

          fetch("/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          })
            .then((resp) => resp.json())
            .then((data) => {
              if (data.error) {
                appendMessage("error", "Error: " + data.error);
                history.pop();
                return;
              }

              const reply = data.reply;
              appendMessage("assistant", reply);
              history.push({ role: "assistant", content: reply });

              if (data.conversation_complete) {
                chatInput.disabled = true;
                chatInput.placeholder = "Conversation complete.";

                appendMessage(
                  "assistant",
                  "The conversation is complete. You will now return to the survey."
                );

                redirectToSurvey();
              }
            })
            .catch((err) => {
              appendMessage("error", "Network error: " + err.message);
              history.pop();
            });
        });
      })();
    </script>
  </body>
</html>
